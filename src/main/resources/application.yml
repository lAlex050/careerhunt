server:
  port: 8082

spring:
  application:
    name: careerhunt

  datasource:
    url: jdbc:postgresql://localhost:5432/careerhunt
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  main:
    banner-mode: off

